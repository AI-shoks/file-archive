# Линтер-гейт для CI (ruff check). Намеренно консервативный набор.
#
# Включено: E/F (pycodestyle + pyflakes — реальные ошибки, неиспользуемые
# импорты/имена), I (сортировка импортов), UP (pyupgrade).
# НЕ включаем flake8-bugbear (B): B008 ложно срабатывает на штатную идиому
# FastAPI — File(...)/Form(...) в дефолтах аргументов.
# line-length=120: вмещает длинные строки monkeypatch-фикстур в тестах,
# не вынуждая дробить их ради линтера.
line-length = 120

[lint]
select = ["E", "F", "I", "UP"]
